name: Build ARM64 Binary

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26.0'

      - name: Build for Linux ARM64
        run: |
          GOOS=linux GOARCH=arm64 go build -v -o xray-knife-linux-arm64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: xray-knife-arm64
          path: xray-knife-linux-arm64
